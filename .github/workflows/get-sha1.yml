name: Get Keystore SHA-1

on:
  workflow_dispatch:

jobs:
  get-sha1:
    runs-on: ubuntu-latest
    steps:
      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '\n\r ' | base64 --decode > /tmp/release.keystore

      - name: Print SHA-1 fingerprint
        run: |
          keytool -list -v \
            -keystore /tmp/release.keystore \
            -alias "${{ secrets.KEY_ALIAS }}" \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
          | grep -A1 "Certificate fingerprints"

      - name: Cleanup
        if: always()
        run: rm -f /tmp/release.keystore
